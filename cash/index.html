<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Cash</title>
<link rel="icon" type="image/png" href="dollar.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #161918;
    --surface2: #1e2220;
    --surface3: #252a28;
    --border: #2a2e2c;
    --accent: #c8f04a;
    --accent-glow: rgba(200, 240, 74, 0.15);
    --text: #e8ece9;
    --text-muted: #6b7570;
    --text-dim: #9aa39e;
    --coin: #f5c842;
    --bill: #7dd6b0;
    --danger: #f47171;
    --danger-dim: rgba(244, 113, 113, 0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,15,14,0.97);
    backdrop-filter: blur(12px);
    z-index: 50;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; text-decoration: none; color: inherit; }
  .brand:active { opacity: 0.7; }
  .brand-icon {
    width: 26px;
    height: 26px;
    align-self: center;
    object-fit: contain;
    flex-shrink: 0;
  }
  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .brand-sub {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── HAMBURGER BUTTON ─── */
  .menu-btn {
    width: 38px; height: 38px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px;
    transition: border-color 0.2s, background 0.2s;
  }
  .menu-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
  .menu-btn span {
    display: block; width: 16px; height: 1.5px;
    background: var(--text-dim); border-radius: 2px;
    transition: background 0.2s, transform 0.28s ease, opacity 0.2s;
    transform-origin: center;
  }
  .menu-btn.is-open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); background: var(--accent); }
  .menu-btn.is-open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .menu-btn.is-open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); background: var(--accent); }

  /* ─── SIDEBAR OVERLAY ─── */
  #sbOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
  }
  #sbOverlay.on { display: block; }

  /* ─── SIDEBAR PANEL ─── */
  #sidebar {
    position: fixed; top: 0; right: 0;
    width: min(310px, 88vw);
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 300;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 32px rgba(0,0,0,0.45);
  }
  #sidebar.on { transform: translateX(0); }

  .sb-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 2px;
    color: var(--accent);
  }
  .sb-close {
    width: 30px; height: 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; line-height: 1;
    transition: border-color 0.15s, color 0.15s;
  }
  .sb-close:hover { border-color: var(--accent); color: var(--accent); }

  .sb-body {
    flex: 1; overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ─── SIDEBAR ROW: Drafts toggle ─── */
  .sb-section { border-bottom: 1px solid var(--border); }

  .sb-row {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 18px;
    font-size: 14px; font-weight: 500;
    color: var(--text-dim); cursor: pointer;
    transition: background 0.12s, color 0.12s;
    user-select: none;
  }
  .sb-row:hover { background: var(--accent-glow); color: var(--accent); }
  .sb-row.danger:hover { background: var(--danger-dim); color: var(--danger); }
  .sb-row svg { flex-shrink: 0; }

  .drafts-badge {
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 11px; font-weight: 600;
    padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center;
    margin-left: 2px;
  }
  .sb-chevron {
    margin-left: auto;
    color: var(--text-muted);
    transition: transform 0.22s ease;
  }
  .sb-chevron.flipped { transform: rotate(180deg); }

  /* ─── DRAFTS PANEL ─── */
  .drafts-panel {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .drafts-panel.open { max-height: 600px; overflow: visible; }

  .drafts-inner { padding: 4px 12px 12px; }

  .drafts-empty {
    text-align: center; padding: 18px 10px;
    color: var(--text-muted); font-size: 13px;
  }
  .drafts-empty-icon { font-size: 26px; margin-bottom: 5px; opacity: 0.35; }

  /* ─── DRAFT CARD ─── */
  .draft-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 11px;
    margin-bottom: 8px; cursor: pointer; position: relative;
    transition: border-color 0.15s, background 0.15s;
  }
  .draft-card:hover { border-color: var(--accent); background: var(--accent-glow); }
  .draft-card:last-child { margin-bottom: 0; }

  .draft-card-row {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 6px;
  }
  .draft-name {
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.4px; line-height: 1.3; word-break: break-all;
  }
  .draft-meta {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    display: flex; align-items: center; gap: 5px;
  }

  .draft-dot-btn {
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    padding: 0 3px; border-radius: 4px; flex-shrink: 0;
    font-size: 17px; line-height: 1; letter-spacing: 0.5px;
    transition: background 0.12s, color 0.12s;
  }
  .draft-dot-btn:hover { background: var(--surface3); color: var(--text); }

  /* ─── CONTEXT MENU ─── */
  .ctx-menu {
    position: fixed; right: auto; top: auto;
    background: var(--surface3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); z-index: 9999; min-width: 148px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.5);
    overflow: hidden;
    display: none;
  }
  .ctx-menu.on { display: block; }
  .ctx-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 13px; font-size: 13px; font-weight: 500;
    color: var(--text-dim); cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .ctx-item:hover { background: var(--accent-glow); color: var(--accent); }
  .ctx-item.del:hover { background: var(--danger-dim); color: var(--danger); }

  /* ─── DELETE ALL DRAFTS ─── */
  .drafts-delete-all-btn {
    width: 100%; padding: 10px; margin-top: 4px;
    background: transparent; color: var(--danger);
    font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 600; letter-spacing: 0.3px;
    border: 1px solid rgba(244,113,113,0.3); border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color 0.15s, background 0.15s;
  }
  .drafts-delete-all-btn:hover { border-color: var(--danger); background: var(--danger-dim); }

  /* ─── DELETE ALL CONFIRM ─── */
  .drafts-confirm {
    background: var(--surface2); border: 1px solid var(--danger);
    border-radius: var(--radius-sm); padding: 12px; margin-top: 4px;
  }
  .drafts-confirm-text {
    font-size: 12.5px; color: var(--text); margin-bottom: 10px; line-height: 1.4;
  }
  .drafts-confirm-actions { display: flex; gap: 8px; }
  .drafts-confirm-actions button {
    flex: 1; padding: 8px; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface3); color: var(--text-dim);
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .drafts-confirm-actions .confirm-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .drafts-confirm-actions .confirm-ok { border-color: rgba(244,113,113,0.4); color: var(--danger); }
  .drafts-confirm-actions .confirm-ok:hover { background: var(--danger-dim); border-color: var(--danger); }

  /* ─── MAIN ─── */
  main { padding: 24px 16px 0; max-width: 480px; margin: 0 auto; }

  /* ─── CURRENCY GROUP ─── */
  .currency-group { margin-bottom: 24px; }
  .currency-group-title {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--coin);
    margin-bottom: 10px; padding-left: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .currency-group-title.notes { color: var(--bill); }
  .currency-group-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .currency-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }

  .currency-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .currency-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--accent-glow); opacity: 0; transition: opacity 0.2s;
  }
  .currency-card:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .currency-card:focus-within::before { opacity: 1; }

  .currency-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 1px; line-height: 1;
    color: var(--coin); position: relative;
  }
  .currency-card.note .currency-label { color: var(--bill); }

  .currency-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500;
    text-align: center; padding: 8px 4px; outline: none;
    transition: border-color 0.2s; -moz-appearance: textfield; position: relative;
  }
  .currency-input::-webkit-outer-spin-button,
  .currency-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .currency-input:focus { border-color: var(--accent); }

  /* ─── CALCULATE BUTTON ─── */
  .calc-btn {
    width: 100%; padding: 16px;
    background: var(--accent); color: #0d0f0e;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px;
    border: none; border-radius: var(--radius); cursor: pointer;
    margin: 8px 0 24px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(200,240,74,0.2);
    position: relative; overflow: hidden;
  }
  .calc-btn::after { content: ''; position: absolute; inset: 0; background: white; opacity: 0; transition: opacity 0.2s; }
  .calc-btn:hover { background: #d4f55a; box-shadow: 0 6px 28px rgba(200,240,74,0.35); }
  .calc-btn:active { transform: scale(0.98); }
  .calc-btn.pulse::after { animation: pulse-flash 0.3s ease; }
  @keyframes pulse-flash { 0% { opacity: 0.3; } 100% { opacity: 0; } }

  /* ─── RESULT ─── */
  .result-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .result-section.visible { opacity: 1; transform: translateY(0); }
  .result-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .result-value { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--accent); letter-spacing: 2px; line-height: 1; transition: color 0.3s; }
  .result-value.zero { color: var(--text-muted); }

  /* ─── SAVE AS DRAFT BUTTON ─── */
  .draft-btn {
    width: 100%; padding: 13px;
    background: transparent; color: var(--accent);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.4px;
    border: 1px solid rgba(200,240,74,0.3); border-radius: var(--radius);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    margin-bottom: 14px;
  }
  .draft-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
  .draft-btn:active { transform: scale(0.98); }

  /* ─── PRINT BUTTON ─── */
  .print-btn {
    width: 100%; padding: 14px; background: transparent;
    color: var(--text-dim); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s;
    margin-bottom: 24px;
  }
  .print-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .print-btn:active { transform: scale(0.98); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--accent); font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 50px; z-index: 9999;
    white-space: nowrap; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 360px) {
    .currency-label { font-size: 19px; }
    .currency-input { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- Sidebar overlay (click to close) -->
<div id="sbOverlay"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-head">
    <span class="sb-title">Menu</span>
    <button class="sb-close" id="sbClose">✕</button>
  </div>
  <div class="sb-body">

    <!-- Save as Draft -->
    <div class="sb-row" id="sbSaveDraftBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
        <polyline points="17,21 17,13 7,13 7,21"/>
        <polyline points="7,3 7,8 15,8"/>
      </svg>
      Save as Draft
    </div>

    <!-- View your Drafts -->
    <div class="sb-section">
      <div class="sb-row" id="draftsToggle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        View your Drafts
        <span class="drafts-badge" id="draftsBadge">0</span>
        <svg class="sb-chevron" id="draftsChev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="drafts-panel" id="draftsPanel">
        <div class="drafts-inner" id="draftsInner">
          <div class="drafts-empty" id="draftsEmpty">
            <div class="drafts-empty-icon">📋</div>
            No drafts saved yet
          </div>
        </div>
      </div>
    </div>

    <!-- Import Drafts -->
    <div class="sb-row" id="importDraftsBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Import Drafts
    </div>
    <input type="file" id="importFileInput" accept=".json,application/json" style="display:none">

    <!-- Clear All -->
    <div class="sb-row danger" id="clearBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
      </svg>
      Clear All
    </div>

  </div>
</div>

<header>
  <a class="brand" id="brandReset" href="https://kariyala.github.io/cash-shell/" title="Shell Cash">
    <img src="dollar-silver.png" alt="" class="brand-icon">
    <span class="brand-name">Shell Cash</span>
    <span class="brand-sub">Counter</span>
  </a>
  <button class="menu-btn" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>

<main>
  <div class="currency-group">
    <div class="currency-group-title">Coins</div>
    <div class="currency-grid">
      <div class="currency-card">
        <div class="currency-label">5¢</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="c5">
      </div>
      <div class="currency-card">
        <div class="currency-label">10¢</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="c10">
      </div>
      <div class="currency-card">
        <div class="currency-label">25¢</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="c25">
      </div>
      <div class="currency-card">
        <div class="currency-label">$1</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="c1">
      </div>
      <div class="currency-card">
        <div class="currency-label">$2</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="c2">
      </div>
    </div>
  </div>

  <div class="currency-group">
    <div class="currency-group-title notes">Notes</div>
    <div class="currency-grid">
      <div class="currency-card note">
        <div class="currency-label">$5</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="n5">
      </div>
      <div class="currency-card note">
        <div class="currency-label">$10</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="n10">
      </div>
      <div class="currency-card note">
        <div class="currency-label">$20</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="n20">
      </div>
      <div class="currency-card note">
        <div class="currency-label">$50</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="n50">
      </div>
      <div class="currency-card note">
        <div class="currency-label">$100</div>
        <input class="currency-input" type="number" min="0" step="1" placeholder="0" id="n100">
      </div>
    </div>
  </div>

  <button class="calc-btn" id="calcBtn">Calculate Total</button>

  <div class="result-section" id="resultSection">
    <div class="result-label">Total Cash</div>
    <div class="result-value zero" id="resultValue">$0.00</div>
  </div>

  <button class="draft-btn" id="saveDraftBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
      <polyline points="17,21 17,13 7,13 7,21"/>
      <polyline points="7,3 7,8 15,8"/>
    </svg>
    Save as Draft
  </button>

  <button class="print-btn" id="printBtn">

<div class="toast" id="toast"></div>

<script>
// ── CURRENCY CONFIG ──
const currencies = [
  { id: 'c5',   pdfLabel: '5¢',   value: 0.05 },
  { id: 'c10',  pdfLabel: '10¢',  value: 0.10 },
  { id: 'c25',  pdfLabel: '25¢',  value: 0.25 },
  { id: 'c1',   pdfLabel: '1$',   value: 1    },
  { id: 'c2',   pdfLabel: '2$',   value: 2    },
  { id: 'n5',   pdfLabel: '5$',   value: 5    },
  { id: 'n10',  pdfLabel: '10$',  value: 10   },
  { id: 'n20',  pdfLabel: '20$',  value: 20   },
  { id: 'n50',  pdfLabel: '50$',  value: 50   },
  { id: 'n100', pdfLabel: '100$', value: 100  },
];

// ── SIDEBAR ──
const menuBtn   = document.getElementById('menuBtn');
const sidebar   = document.getElementById('sidebar');
const sbOverlay = document.getElementById('sbOverlay');
const sbClose   = document.getElementById('sbClose');

function openSidebar() {
  sidebar.classList.add('on');
  sbOverlay.classList.add('on');
  menuBtn.classList.add('is-open');
  renderDrafts();
}

function closeSidebar() {
  sidebar.classList.remove('on');
  sbOverlay.classList.remove('on');
  menuBtn.classList.remove('is-open');
  hideCtxMenu();
}

menuBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  sidebar.classList.contains('on') ? closeSidebar() : openSidebar();
});

sbOverlay.addEventListener('click', closeSidebar);
sbClose.addEventListener('click', closeSidebar);

// ── DRAFTS TOGGLE ──
const draftsToggle = document.getElementById('draftsToggle');
const draftsPanel  = document.getElementById('draftsPanel');
const draftsChev   = document.getElementById('draftsChev');

draftsToggle.addEventListener('click', function() {
  draftsPanel.classList.toggle('open');
  draftsChev.classList.toggle('flipped');
});

// ── DRAFT STORAGE ──
const DRAFT_KEY  = 'shell_cash_drafts';
const MAX_DRAFTS = 5;

function loadDrafts() {
  try { return JSON.parse(localStorage.getItem(DRAFT_KEY)) || []; }
  catch(e) { return []; }
}

function storeDrafts(arr) {
  localStorage.setItem(DRAFT_KEY, JSON.stringify(arr));
}

function todayDDMM() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + String(d.getMonth()+1).padStart(2,'0');
}

function fmtDate(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dd = String(d.getDate()).padStart(2,'0');
  const mon = months[d.getMonth()];
  const yyyy = d.getFullYear();
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  return `${dd} ${mon} ${yyyy}, ${h}:${m} ${ap}`;
}

// ── RENDER DRAFTS ──
var openCtxMenu = null;

function hideCtxMenu() {
  if (openCtxMenu) { openCtxMenu.classList.remove('on'); openCtxMenu = null; }
}

function renderDrafts() {
  const drafts = loadDrafts();
  document.getElementById('draftsBadge').textContent = drafts.length;

  const inner = document.getElementById('draftsInner');
  const empty = document.getElementById('draftsEmpty');

  // remove old cards + old delete-all button/confirm so re-renders don't duplicate them
  inner.querySelectorAll('.draft-card').forEach(el => el.remove());
  inner.querySelectorAll('.drafts-delete-all-btn').forEach(el => el.remove());
  inner.querySelectorAll('.drafts-confirm').forEach(el => el.remove());

  if (drafts.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  drafts.forEach(function(draft, idx) {
    var card = document.createElement('div');
    card.className = 'draft-card';

    card.innerHTML =
      '<div class="draft-card-row">' +
        '<div>' +
          '<div class="draft-name">' + draft.name + '</div>' +
          '<div class="draft-meta">' +
            '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
            fmtDate(draft.savedAt) +
          '</div>' +
        '</div>' +
        '<button class="draft-dot-btn">⋯</button>' +
      '</div>' +
      '<div class="ctx-menu">' +
        '<div class="ctx-item" data-action="load">'+
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'+
          ' Load Draft'+
        '</div>' +
        '<div class="ctx-item" data-action="export">'+
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+
          ' Export as JSON'+
        '</div>' +
        '<div class="ctx-item del" data-action="del">'+
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>'+
          ' Delete'+
        '</div>' +
      '</div>';

    // card body click = load
    card.addEventListener('click', function(e) {
      if (e.target.closest('.draft-dot-btn') || e.target.closest('.ctx-menu')) return;
      applyDraft(idx);
    });

    // dot-btn click = toggle context menu
    card.querySelector('.draft-dot-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      var ctx = card.querySelector('.ctx-menu');
      if (ctx.classList.contains('on')) { hideCtxMenu(); return; }
      hideCtxMenu();
      var btnRect = e.currentTarget.getBoundingClientRect();
      ctx.style.top = (btnRect.bottom + 6) + 'px';
      ctx.style.right = (window.innerWidth - btnRect.right) + 'px';
      ctx.classList.add('on');
      openCtxMenu = ctx;
    });

    // context menu item clicks
    card.querySelector('.ctx-menu').addEventListener('click', function(e) {
      e.stopPropagation();
      var item = e.target.closest('.ctx-item');
      if (!item) return;
      hideCtxMenu();
      var action = item.dataset.action;
      if (action === 'load') applyDraft(idx);
      else if (action === 'export') exportDraftAsJSON(idx);
      else if (action === 'del') delDraft(idx);
    });

    inner.appendChild(card);
  });

  // ── DELETE ALL DRAFTS BUTTON ──
  var delAllBtn = document.createElement('button');
  delAllBtn.type = 'button';
  delAllBtn.className = 'drafts-delete-all-btn';
  delAllBtn.innerHTML =
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>'+
    ' Delete All Drafts';
  delAllBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    showDeleteAllConfirm(inner, delAllBtn);
  });
  inner.appendChild(delAllBtn);
}

// ── DELETE ALL CONFIRM ──
function showDeleteAllConfirm(inner, delAllBtn) {
  inner.querySelectorAll('.drafts-confirm').forEach(function(el){ el.remove(); });

  var confirmBox = document.createElement('div');
  confirmBox.className = 'drafts-confirm';
  confirmBox.innerHTML =
    '<div class="drafts-confirm-text">Want to delete all drafts?</div>' +
    '<div class="drafts-confirm-actions">' +
      '<button type="button" class="confirm-cancel">Cancel</button>' +
      '<button type="button" class="confirm-ok">Ok</button>' +
    '</div>';

  delAllBtn.style.display = 'none';
  inner.appendChild(confirmBox);

  confirmBox.querySelector('.confirm-cancel').addEventListener('click', function(e) {
    e.stopPropagation();
    confirmBox.remove();
    delAllBtn.style.display = '';
  });

  confirmBox.querySelector('.confirm-ok').addEventListener('click', function(e) {
    e.stopPropagation();
    storeDrafts([]);
    renderDrafts();
    showToast('All drafts deleted');
  });
}

// close ctx menu on click outside sidebar
document.addEventListener('click', function() { hideCtxMenu(); });
sidebar.addEventListener('click', function(e) {
  if (!e.target.closest('.draft-dot-btn') && !e.target.closest('.ctx-menu')) hideCtxMenu();
});

// ── SAVE DRAFT ──
function saveCurrentAsDraft() {
  var counts = {};
  currencies.forEach(function(c) {
    counts[c.id] = parseInt(document.getElementById(c.id).value) || 0;
  });

  var drafts = loadDrafts();
  var ddmm = todayDDMM();
  var prefix = 'Cash-draft-' + ddmm + '-';
  var maxN = 0;
  drafts.forEach(function(d) {
    if (d.name.startsWith(prefix)) {
      var n = parseInt(d.name.slice(prefix.length), 10);
      if (!isNaN(n) && n > maxN) maxN = n;
    }
  });
  var name = prefix + (maxN + 1);

  drafts.unshift({ id: Date.now().toString(), name: name, counts: counts, savedAt: new Date().toISOString() });
  if (drafts.length > MAX_DRAFTS) drafts.pop();
  storeDrafts(drafts);

  // open sidebar + expand drafts panel
  openSidebar();
  if (!draftsPanel.classList.contains('open')) {
    draftsPanel.classList.add('open');
    draftsChev.classList.add('flipped');
  }

  showToast('Saved: ' + name);
}

document.getElementById('saveDraftBtn').addEventListener('click', saveCurrentAsDraft);
document.getElementById('sbSaveDraftBtn').addEventListener('click', saveCurrentAsDraft);

// ── APPLY DRAFT ──
function applyDraft(idx) {
  var draft = loadDrafts()[idx];
  if (!draft) return;
  currencies.forEach(function(c) {
    document.getElementById(c.id).value = draft.counts[c.id] || '';
  });
  calcTotal();
  closeSidebar();
  showToast('Loaded: ' + draft.name);
}

// ── EXPORT DRAFT AS JSON ──
function exportDraftAsJSON(idx) {
  var draft = loadDrafts()[idx];
  if (!draft) return;
  try {
    var dataStr = JSON.stringify(draft, null, 2);
    var blob = new Blob([dataStr], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = draft.name + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Exported: ' + draft.name);
  } catch (e) {
    showToast('Export failed');
  }
}

// ── IMPORT DRAFTS ──
var importDraftsBtn = document.getElementById('importDraftsBtn');
var importFileInput = document.getElementById('importFileInput');

importDraftsBtn.addEventListener('click', function() {
  importFileInput.click();
});

importFileInput.addEventListener('change', function(e) {
  var file = e.target.files[0];
  e.target.value = ''; // reset so the same file can be re-selected later
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(evt) {
    var parsed;
    try {
      parsed = JSON.parse(evt.target.result);
    } catch (err) {
      showToast('Invalid JSON file');
      return;
    }

    var items = Array.isArray(parsed) ? parsed : [parsed];
    var drafts = loadDrafts();
    var ddmm = todayDDMM();
    var prefix = 'imported-cash-draft-' + ddmm + '-';
    var maxN = 0;
    drafts.forEach(function(d) {
      if (d.name && d.name.startsWith(prefix)) {
        var n = parseInt(d.name.slice(prefix.length), 10);
        if (!isNaN(n) && n > maxN) maxN = n;
      }
    });

    var importedCount = 0;
    items.forEach(function(item) {
      if (!item || typeof item !== 'object' || !item.counts) return;
      maxN += 1;
      drafts.unshift({
        id: Date.now().toString() + '-' + maxN,
        name: prefix + maxN,
        counts: item.counts,
        savedAt: new Date().toISOString()
      });
      importedCount++;
    });

    if (importedCount === 0) {
      showToast('No valid drafts found in file');
      return;
    }

    while (drafts.length > MAX_DRAFTS) drafts.pop();
    storeDrafts(drafts);

    openSidebar();
    if (!draftsPanel.classList.contains('open')) {
      draftsPanel.classList.add('open');
      draftsChev.classList.add('flipped');
    }
    renderDrafts();

    showToast(importedCount === 1 ? 'Imported 1 draft' : 'Imported ' + importedCount + ' drafts');
  };
  reader.readAsText(file);
});

// ── DELETE DRAFT ──
function delDraft(idx) {
  var drafts = loadDrafts();
  var name = drafts[idx] ? drafts[idx].name : 'Draft';
  drafts.splice(idx, 1);
  storeDrafts(drafts);
  renderDrafts();
  showToast('Deleted: ' + name);
}

// ── CLEAR ALL (shared) ──
function clearAllFields(msg) {
  document.querySelectorAll('.currency-input').forEach(function(i){ i.value = ''; });
  var rv = document.getElementById('resultValue');
  rv.textContent = '$0.00'; rv.classList.add('zero');
  document.getElementById('resultSection').classList.remove('visible');
  closeSidebar();
  showToast(msg || 'All fields cleared');
}

document.getElementById('clearBtn').addEventListener('click', function() {
  clearAllFields('All fields cleared');
});

// ── CALCULATE ──
function calcTotal() {
  var total = 0;
  currencies.forEach(function(c) {
    var count = parseInt(document.getElementById(c.id).value) || 0;
    total += count * c.value;
  });
  total = Math.round(total * 100) / 100;
  var rv = document.getElementById('resultValue');
  rv.textContent = '$' + total.toFixed(2);
  rv.classList.toggle('zero', total === 0);
  document.getElementById('resultSection').classList.add('visible');
  return total;
}

document.getElementById('calcBtn').addEventListener('click', function() {
  calcTotal();
  var btn = document.getElementById('calcBtn');
  btn.classList.remove('pulse'); void btn.offsetWidth; btn.classList.add('pulse');
});

// ── TOAST ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

  input.addEventListener('input', function() {
    if (input.value < 0) input.value = 0;
    if (input.value.includes('.')) input.value = Math.floor(parseFloat(input.value));
  });

  function registerInterFonts(doc) {
    doc.addFileToVFS('Inter-Regular.ttf', INTER_REGULAR_B64);
    doc.addFont('Inter-Regular.ttf', 'Inter', 'normal');
    doc.addFileToVFS('Inter-Medium.ttf', INTER_MEDIUM_B64);
    doc.addFont('Inter-Medium.ttf', 'Inter-Medium', 'normal');
    doc.addFileToVFS('Inter-Bold.ttf', INTER_BOLD_B64);

  }

  // ── PDF ──
  document.getElementById('printBtn').addEventListener('click', () => {
    const { jsPDF } = window.jspdf;
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const hh = pad(now.getHours()), mm = pad(now.getMinutes()), ss = pad(now.getSeconds());
    const dd = pad(now.getDate());
    const mmNum = pad(now.getMonth() + 1);
    const yyyy = now.getFullYear();
    const fullMonthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const shortMonthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const fullMon = fullMonthNames[now.getMonth()];

    // Collect counts
    const counts = {};
    let total = 0;
    currencies.forEach(c => {
      const count = parseInt(document.getElementById(c.id).value) || 0;
      counts[c.id] = count;
      total += count * c.value;
    });
    total = Math.round(total * 100) / 100;

    // ── Build PDF (A5, white) ──
    const doc = new jsPDF({ unit: 'mm', format: 'a5' });

    const H = doc.internal.pageSize.getHeight();
    const L = 18; // left margin

    registerInterFonts(doc);

    // White background (default)
    doc.setFillColor(255,255,255);
    doc.rect(0, 0, W, H, 'F');

    // ── Title: Inter Bold ──
    doc.setFont('Inter-Bold', 'normal');
    doc.setFontSize(20);
    doc.setTextColor(15, 15, 15);
    doc.text('Shell - Cash Drawer', L, 22);

    // ── Divider under title ──
    doc.setDrawColor(210, 210, 210);
    doc.setLineWidth(0.4);
    doc.line(L, 26, W - L, 26);

    // ── Timestamp: Time - HH:MM:SS   Date - DD/MM/YYYY ──
    doc.setFont('Inter', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(60, 60, 60);
    doc.text(`Time - ${hh}:${mm}:${ss}   Date - ${dd}/${mmNum}/${yyyy}`, L, 34);

    // ── Divider after timestamp ──
    doc.setDrawColor(220, 220, 220);
    doc.setLineWidth(0.3);
    doc.line(L, 38, W - L, 38);

    // ── Currency rows: aligned columns ──

    const colEq     = L + 42;  // "="

    doc.setFont('Inter-Medium', 'normal');
    doc.setFontSize(13);
    doc.setTextColor(20, 20, 20);

    currencies.forEach(c => {
      const count = counts[c.id];
      const amt = Math.round(count * c.value * 100) / 100;
      let amtStr;
      if (amt === 0) {
        amtStr = '$0';
      } else if (amt % 1 === 0) {
        amtStr = '$' + amt.toFixed(0);
      } else {
        amtStr = '$' + amt.toFixed(2);
      }
      doc.text(c.pdfLabel,       colLabel, y);
      doc.text(':',               colColon, y);
      doc.text(String(count),    colCount, y, { align: 'right' });
      doc.text('=',               colEq,   y);
      doc.text(amtStr,            colAmt,  y);
      y += rowGap;
    });

    // ── Divider before total ──
    y += 2;
    doc.setDrawColor(180, 180, 180);
    doc.setLineWidth(0.4);
    doc.line(L, y, W - L, y);
    y += 8;

    // ── Total: Inter Bold ──
    doc.setFont('Inter-Bold', 'normal');
    doc.setFontSize(15);
    doc.setTextColor(15, 15, 15);
    doc.text('Total Cash', L, y);
    doc.text(`$${total.toFixed(2)}`, L + 42, y);

    // ── Save ──
    const filename = `shell-cash-${dd}-${fullMon}${yyyy}.pdf`;
    doc.save(filename);
    showToast
  showToast(`Saved: ${filename}`);
  });

// init badge
document.getElementById('draftsBadge').textContent = loadDrafts().length;

</script>
</body>
</html>
