<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scratch Count Shell</title>
<link rel="icon" type="image/png" href="lotto.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f11;
  --surface: #19191f;
  --surface2: #222229;
  --border: #2e2e38;
  --accent: #f0c040;
  --text: #e8e8ec;
  --text-dim: #6e6e80;
  --text-muted: #3e3e50;
  --green: #3ecf8e;
  --red: #f06060;
  --blue: #60a8f0;
  --radius: 14px;
  --radius-sm: 8px;
  --sidebar-w: 300px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

/* SIDEBAR OVERLAY */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 300; opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease;
  backdrop-filter: blur(2px);
}
.sidebar-overlay.open { opacity: 1; pointer-events: all; }

/* SIDEBAR */
.sidebar {
  position: fixed; top: 0; right: 0;
  width: var(--sidebar-w); height: 100vh;
  background: #13131a;
  border-left: 1px solid var(--border);
  z-index: 400;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: -8px 0 48px rgba(0,0,0,0.6);
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 18px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent);
}
.sidebar-close {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-dim);
  transition: background 0.2s, color 0.2s;
}
.sidebar-close:hover { background: var(--border); color: var(--text); }

.sidebar-body {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; color: var(--text);
  transition: background 0.15s; border: 1px solid transparent;
  user-select: none;
}
.sidebar-item:hover { background: var(--surface2); }
.sidebar-item svg { color: var(--text-dim); flex-shrink: 0; }
.sidebar-item.danger { color: var(--red); }
.sidebar-item.danger svg { color: var(--red); }
.sidebar-item.danger:hover { background: rgba(240,96,96,0.08); border-color: rgba(240,96,96,0.15); }

.draft-badge {
  margin-left: auto; background: var(--accent);
  color: #0f0f11; font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 600; border-radius: 20px;
  padding: 2px 7px; min-width: 20px; text-align: center; line-height: 1.5;
}
.draft-badge.zero { background: var(--surface2); color: var(--text-dim); }

.sidebar-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* DRAFTS PANEL */
.drafts-panel { display: none; flex-direction: column; gap: 8px; }
.drafts-panel.open { display: flex; }

.drafts-panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 4px 6px;
}
.drafts-back {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-size: 13px; padding: 4px 6px; border-radius: 6px;
  transition: background 0.15s, color 0.15s;
}
.drafts-back:hover { background: var(--surface2); color: var(--text); }

.draft-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 12px 10px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.draft-card:hover { border-color: rgba(240,192,64,0.35); background: var(--surface2); }
.draft-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.draft-card-name {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  color: var(--accent); letter-spacing: 0.03em; line-height: 1.3; flex: 1;
}
.draft-card-meta { font-size: 11px; color: var(--text-dim); margin-top: 5px; letter-spacing: 0.01em; }

.draft-dots {
  background: none; border: 1px solid transparent; border-radius: 5px;
  padding: 3px 5px; cursor: pointer; color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s, color 0.15s; flex-shrink: 0;
}
.draft-dots:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }

.draft-popover {
  position: absolute; right: 10px; top: 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); z-index: 10;
  min-width: 155px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  overflow: hidden; animation: fadeSlide 0.15s ease forwards;
}
.draft-popover-item {
  padding: 10px 14px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 9px;
  transition: background 0.12s; color: var(--text);
}
.draft-popover-item:hover { background: var(--surface2); }
.draft-popover-item.delete { color: var(--red); }
.draft-popover-item.delete:hover { background: rgba(240,96,96,0.08); }

.draft-confirm {
  background: rgba(240,96,96,0.07);
  border: 1px solid rgba(240,96,96,0.22);
  border-radius: var(--radius-sm); padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  animation: fadeSlide 0.18s ease forwards;
}
.draft-confirm-text { font-size: 13px; color: var(--text); line-height: 1.5; }
.draft-confirm-name { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; }
.draft-confirm-btns { display: flex; gap: 8px; }
.confirm-yes {
  flex: 1; padding: 9px; background: var(--red); border: none;
  border-radius: 7px; color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.confirm-yes:hover { opacity: 0.85; }
.confirm-no {
  flex: 1; padding: 9px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-size: 13px; cursor: pointer;
  transition: background 0.2s;
}
.confirm-no:hover { background: var(--border); }

.drafts-empty {
  text-align: center; padding: 28px 0 16px;
  font-size: 13px; color: var(--text-muted);
}

.delete-all-btn {
  width: 100%; padding: 12px;
  background: transparent; color: var(--red);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase;
  border: 1px solid rgba(240,96,96,0.3); border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.2s, border-color 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 8px;
}
.delete-all-btn:hover { background: rgba(240,96,96,0.08); border-color: rgba(240,96,96,0.5); }

.delete-all-confirm {
  background: rgba(240,96,96,0.07);
  border: 1px solid rgba(240,96,96,0.22);
  border-radius: var(--radius-sm); padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 8px;
  animation: fadeSlide 0.18s ease forwards;
}

/* TOP BAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(15,15,17,0.96);
  backdrop-filter: blur(16px); z-index: 100;
}
.app-title {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase;
  cursor: default; user-select: none; -webkit-user-select: none;
}
.menu-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); width: 42px; height: 42px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; cursor: pointer; transition: background 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.menu-btn:hover { background: var(--border); }
.menu-btn span { width: 16px; height: 1.5px; background: var(--text); border-radius: 2px; display: block; }

/* PILL SWITCHER */
.switcher-wrap { display: flex; justify-content: center; padding: 16px 12px 12px; }
.pill-switcher {
  position: relative; background: var(--surface);
  border: 1px solid var(--border); border-radius: 40px;
  display: flex; padding: 4px; width: 100%; max-width: 400px;
}
.pill-track {
  position: absolute; top: 4px; left: 4px;
  height: calc(100% - 8px); background: var(--accent);
  border-radius: 36px;
  transition: left 0.3s cubic-bezier(0.34,1.56,0.64,1), width 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 0;
}
.pill-btn {
  position: relative; z-index: 1; flex: 1;
  padding: 11px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  border: none; background: transparent; color: var(--text-dim);
  cursor: pointer; border-radius: 36px; transition: color 0.2s;
  white-space: nowrap; text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.pill-btn.active { color: #0f0f11; }

/* MAIN CONTENT */
.content { max-width: 520px; margin: 0 auto; padding: 8px 12px 100px; }

.view { display: none; animation: fadeSlide 0.25s ease forwards; }
.view.active { display: block; }

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 10px; padding-left: 2px;
}

/* ── THIS SHIFT: side-by-side inside + outside ── */
.shift-row-header {
  display: grid; grid-template-columns: 40px 1fr 14px 1fr 40px;
  gap: 0 8px; margin-bottom: 8px; padding: 0 4px;
}
.shift-col-head {
  font-family: 'DM Mono', monospace; font-size: 14px;
  letter-spacing: 0.08em; text-transform: uppercase;
  text-align: center; padding: 6px 0; font-weight: 600;
}
.shift-col-head.inside  { color: var(--accent); }
.shift-col-head.outside { color: var(--blue); }
.shift-col-head.gap-col { /* spacer */ }

.shift-rows { display: flex; flex-direction: column; gap: 8px; }

.shift-row {
  display: grid; grid-template-columns: 40px 1fr 14px 1fr 40px;
  gap: 0 8px; align-items: center;
}
.shift-denom {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
  color: var(--accent); text-align: right; padding-right: 4px;
  line-height: 1;
}

/* double-tap gap zone between inside and outside */
.shift-gap {
  display: flex; align-items: center; justify-content: center;
  height: 100%; cursor: default; user-select: none;
}
.shift-gap-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--text-muted); opacity: 0.5;
}

.shift-cell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 6px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%; min-height: 56px;
}
.shift-cell:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(240,192,64,0.12);
}
.shift-cell.outside-cell:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(96,168,240,0.12);
}
.shift-input {
  width: 100%; background: transparent; border: none; outline: none;
  font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 400;
  color: var(--text); text-align: center; -webkit-appearance: none;
}
.shift-input::placeholder { color: var(--text-muted); font-size: 20px; }
.shift-input::-webkit-inner-spin-button,
.shift-input::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── CALCULATION VIEW ── */
.calc-table {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
}

/* 5-col header: Ticket | Prev. | This Shift | Sold | Amount */
.calc-table-header {
  display: grid; grid-template-columns: 38px 1fr 1fr 1fr 1fr;
  gap: 0; padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(240,192,64,0.04);
}
.calc-head {
  font-family: 'DM Mono', monospace; font-size: 9px;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-dim); text-align: center;
}
.calc-head:first-child { text-align: left; }

.calc-rows { padding: 2px 0; }
.calc-row {
  display: grid; grid-template-columns: 38px 1fr 1fr 1fr 1fr;
  gap: 0; padding: 7px 8px;
  border-bottom: 1px solid rgba(46,46,56,0.5);
  align-items: center; min-height: 46px;
}
.calc-row:last-child { border-bottom: none; }
.calc-row:nth-child(even) { background: rgba(255,255,255,0.015); }

.calc-denom {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
  color: var(--accent);
}
.calc-val {
  font-family: 'DM Mono', monospace; font-size: 13px;
  text-align: center; color: var(--text);
}
.calc-val.prev-col { color: var(--blue); }
.calc-val.curr-col { color: var(--green); }
.calc-val.sold-col { color: var(--text-dim); }
.calc-val.amt-col  { color: var(--accent); font-weight: 600; }
.calc-val.amt-zero { color: var(--text-muted); }
.calc-val.restock  { color: var(--text-muted); font-size: 9px; }

/* Inline prev input inside calc table */
.prev-inline-wrap {
  display: flex; align-items: center; justify-content: center;
}
.prev-inline {
  width: 44px; background: transparent; border: none;
  outline: none;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 400;
  color: var(--blue); text-align: center; padding: 6px 2px;
  -webkit-appearance: none; min-height: 32px;
}
.prev-inline::placeholder { color: var(--text-muted); font-size: 11px; }
.prev-inline::-webkit-inner-spin-button,
.prev-inline::-webkit-outer-spin-button { -webkit-appearance: none; }

.calc-total-bar {
  padding: 16px 18px; background: rgba(240,192,64,0.07);
  border-top: 1px solid rgba(240,192,64,0.2);
  display: flex; align-items: baseline; justify-content: space-between;
}
.ct-label {
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase;
}
.ct-amount {
  font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500;
  color: var(--accent); letter-spacing: 0.02em;
}

/* BUTTONS */
.draft-btn {
  padding: 15px 20px;
  background: transparent; color: var(--blue);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid rgba(96,168,240,0.4); border-radius: var(--radius);
  cursor: pointer; transition: background 0.2s, transform 0.15s, border-color 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 10px; width: auto;
}
.draft-btn:hover { background: rgba(96,168,240,0.08); border-color: var(--blue); }
.draft-btn:active { transform: scale(0.98); background: rgba(96,168,240,0.1); }

.report-btn {
  width: 100%; padding: 17px;
  background: var(--accent); color: #0f0f11;
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: none; border-radius: var(--radius); cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-top: 6px;
}
.report-btn:hover { opacity: 0.88; }
.report-btn:active { transform: scale(0.98); }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 40px; padding: 12px 24px; font-size: 13px;
  color: var(--text); opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s; white-space: nowrap; z-index: 500;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">Menu</div>
    <div class="sidebar-close" onclick="closeSidebar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div class="sidebar-body" id="sidebarBody">
    <!-- Main menu -->
    <div id="sidebarMainMenu">
      <div class="sidebar-item" onclick="saveAsDraft(); closeSidebar();">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save as Draft
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-item" onclick="openDraftsPanel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        View your Drafts
        <span class="draft-badge zero" id="sidebarDraftCount">0</span>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-item danger" onclick="clearAllInputs(); closeSidebar(); showToast('All cleared');">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.57"/></svg>
        Clear All
      </div>
    </div>

    <!-- Drafts panel -->
    <div class="drafts-panel" id="draftsPanel">
      <div class="drafts-panel-header">
        <button class="drafts-back" onclick="closeDraftsPanel()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
      </div>
      <div id="draftsListContainer"></div>
      <div id="deleteAllContainer"></div>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="app-title">Scratch&nbsp;Counter</div>
  <div class="menu-btn" onclick="openSidebar()">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- PILL SWITCHER -->
<div class="switcher-wrap">
  <div class="pill-switcher" id="mainSwitcher">
    <div class="pill-track" id="pillTrack"></div>
    <button class="pill-btn active" onclick="switchView('this-shift', this)">This Shift</button>
    <button class="pill-btn"       onclick="switchView('calculation', this)">Calculation</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ══ THIS SHIFT ══ -->
  <div class="view active" id="view-this-shift">
    <div class="shift-row-header">
      <div></div>
      <div class="shift-col-head inside">Inside</div>
      <div class="shift-col-head gap-col"></div>
      <div class="shift-col-head outside" style="color:var(--blue)">Outside</div>
    </div>
    <div id="dt-this-shift"><div class="shift-rows" id="shift-rows"></div></div>

    <button class="draft-btn" style="margin-top:16px; margin-left: calc(40px + 8px); width: calc(100% - (40px + 8px) - (40px + 8px));" onclick="saveAsDraft()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save as Draft
    </button>
  </div>

  <!-- ══ CALCULATION ══ -->
  <div class="view" id="view-calculation">
    <div class="section-label">Scratch Sales This Shift</div>

    <div class="calc-table" id="calc-table">
      <div class="calc-table-header">
        <div class="calc-head">Ticket</div>
        <div class="calc-head">Prev.</div>
        <div class="calc-head">This Shift</div>
        <div class="calc-head">Sold</div>
        <div class="calc-head">Amount</div>
      </div>
      <div class="calc-rows" id="calc-rows"></div>
      <div class="calc-total-bar">
        <div class="ct-label">Total Sold</div>
        <div class="ct-amount" id="calc-total">$0</div>
      </div>
    </div>

    <button class="draft-btn" style="width:100%;" onclick="saveAsDraft()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save as Draft
    </button>

    <button class="report-btn" onclick="downloadScratchReport()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Scratch Report
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const DENOMS = [2, 3, 4, 5, 10, 20, 30, 50, 100];
const MAX_DRAFTS = 8;
const DRAFTS_KEY = 'scratch_v3_drafts';

// ── BUILD THIS SHIFT GRID ──
(function buildShiftGrid() {
  const shiftRows = document.getElementById('shift-rows');
  DENOMS.forEach(d => {
    const sr = document.createElement('div');
    sr.className = 'shift-row';
    sr.innerHTML =
      '<div class="shift-denom">$' + d + '</div>' +
      '<div class="shift-cell">' +
        '<input class="shift-input" type="number" min="0" step="1" placeholder="0" ' +
          'id="inside-' + d + '" inputmode="numeric" ' +
          'oninput="this.value=this.value.replace(/[^0-9]/g,\'\'); onInputChange()">' +
      '</div>' +
      '<div class="shift-gap"><div class="shift-gap-dot"></div></div>' +
      '<div class="shift-cell outside-cell">' +
        '<input class="shift-input" type="number" min="0" step="1" placeholder="0" ' +
          'id="outside-' + d + '" inputmode="numeric" ' +
          'oninput="this.value=this.value.replace(/[^0-9]/g,\'\'); onInputChange()">' +
      '</div>';
    shiftRows.appendChild(sr);
  });
})();

// ── HELPERS ──
function getVal(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  const v = parseInt(el.value, 10);
  return isNaN(v) ? 0 : v;
}

function onInputChange() {
  if (document.getElementById('view-calculation').classList.contains('active')) {
    updateCalcTotals();
  }
}

// ── CALC: build rows once, update values live ──
function buildCalcRows() {
  const rows = document.getElementById('calc-rows');
  rows.innerHTML = '';
  DENOMS.forEach(d => {
    const row = document.createElement('div');
    row.className = 'calc-row';
    row.id = 'calc-row-' + d;
    row.innerHTML =
      '<div class="calc-denom">$' + d + '</div>' +
      '<div class="prev-inline-wrap">' +
        '<input class="prev-inline" type="number" min="0" step="1" placeholder="—" ' +
          'id="prev-' + d + '" inputmode="numeric" ' +
          'oninput="this.value=this.value.replace(/[^0-9]/g,\'\'); updateCalcTotals()">' +
      '</div>' +
      '<div class="calc-val curr-col" id="curr-' + d + '">—</div>' +
      '<div class="calc-val sold-col" id="sold-' + d + '">—</div>' +
      '<div class="calc-val amt-zero"  id="amt-'  + d + '">—</div>';
    rows.appendChild(row);
  });
}

function updateCalcTotals() {
  let grand = 0;
  DENOMS.forEach(d => {
    const prev    = getVal('prev-' + d);
    const curr    = getVal('inside-' + d) + getVal('outside-' + d);
    const soldQty = prev - curr;
    const soldAmt = soldQty > 0 ? soldQty * d : 0;
    grand += soldAmt;

    const currEl = document.getElementById('curr-' + d);
    const soldEl = document.getElementById('sold-' + d);
    const amtEl  = document.getElementById('amt-'  + d);

    // This Shift column
    if (currEl) {
      currEl.textContent = (getVal('inside-' + d) + getVal('outside-' + d)) || '—';
    }

    // Sold & Amount
    if (soldEl && amtEl) {
      if (soldQty > 0) {
        soldEl.textContent = soldQty;
        soldEl.className = 'calc-val sold-col';
        amtEl.textContent  = '$' + soldAmt;
        amtEl.className    = 'calc-val amt-col';
      } else if (soldQty < 0) {
        soldEl.textContent = 'restock';
        soldEl.className = 'calc-val restock';
        amtEl.textContent  = '—';
        amtEl.className    = 'calc-val amt-zero';
      } else {
        soldEl.textContent = '—';
        soldEl.className = 'calc-val amt-zero';
        amtEl.textContent  = '—';
        amtEl.className    = 'calc-val amt-zero';
      }
    }
  });

  // Always show live This Shift values even when prev is blank
  DENOMS.forEach(d => {
    const currEl = document.getElementById('curr-' + d);
    const curr = getVal('inside-' + d) + getVal('outside-' + d);
    if (currEl) currEl.textContent = curr > 0 ? curr : '—';
  });

  document.getElementById('calc-total').textContent = '$' + grand;
}

// ── PILL SWITCHER ──
function switchView(viewName, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('#mainSwitcher .pill-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + viewName).classList.add('active');
  btn.classList.add('active');
  positionPill(btn);
  if (viewName === 'calculation') updateCalcTotals();
}

function positionPill(btn) {
  const sw    = document.getElementById('mainSwitcher');
  const track = document.getElementById('pillTrack');
  const swR   = sw.getBoundingClientRect();
  const bR    = btn.getBoundingClientRect();
  track.style.left  = (bR.left - swR.left + 4) + 'px';
  track.style.width = btn.offsetWidth + 'px';
}

window.addEventListener('load', function() {
  buildCalcRows();
  positionPill(document.querySelector('#mainSwitcher .pill-btn.active'));
  updateDraftBadge();
  updateCalcTotals();

  // ── DOUBLE TAP / DOUBLE CLICK TO SAVE DRAFT ──
  // On touch devices: touchend double-tap only (no click events used)
  // On desktop: dblclick only
  // In both cases single tap/click never triggers save
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function setupDoubleTap(el) {
    if (!el) return;
    if (isTouchDevice) {
      let lastTap = 0;
      el.addEventListener('touchend', function(e) {
        if (e.target.closest('input') || e.target.closest('button')) return;
        const now = Date.now();
        if (now - lastTap < 400 && now - lastTap > 30) {
          e.preventDefault();
          saveAsDraft();
        }
        lastTap = now;
      }, { passive: false });
    } else {
      el.addEventListener('dblclick', function(e) {
        if (e.target.closest('input') || e.target.closest('button')) return;
        saveAsDraft();
      });
    }
  }

  setupDoubleTap(document.getElementById('dt-this-shift'));
  setupDoubleTap(document.querySelector('.app-title'));
});

// ── DRAFT STORAGE ──
function loadDrafts() {
  try { return JSON.parse(localStorage.getItem(DRAFTS_KEY)) || []; }
  catch(e) { return []; }
}
function saveDraftsStore(d) { localStorage.setItem(DRAFTS_KEY, JSON.stringify(d)); }

function getDraftName() {
  const now  = new Date();
  const dd   = String(now.getDate()).padStart(2,'0');
  const mo   = String(now.getMonth()+1).padStart(2,'0');
  const ddmm = dd + mo;
  const drafts = loadDrafts();
  const todayN = drafts.filter(d => d.ddmm === ddmm);
  const maxN   = todayN.reduce((m,d) => Math.max(m, d.n||0), 0);
  return { name: 'Scratch-Draft-' + ddmm + '-' + (maxN+1), ddmm, n: maxN+1 };
}

function collectData() {
  const data = { inside:{}, outside:{}, prev:{} };
  DENOMS.forEach(d => {
    data.inside[d]  = getVal('inside-'  + d);
    data.outside[d] = getVal('outside-' + d);
    data.prev[d]    = getVal('prev-'    + d);
  });
  return data;
}

function saveAsDraft() {
  const { name, ddmm, n } = getDraftName();
  let drafts = loadDrafts();
  if (drafts.length >= MAX_DRAFTS) drafts.shift();
  drafts.push({ id: Date.now(), name, ddmm, n, savedAt: new Date().toISOString(), data: collectData() });
  saveDraftsStore(drafts);
  updateDraftBadge();
  showToast('Saved: ' + name);
}

function updateDraftBadge() {
  const cnt = loadDrafts().length;
  const el  = document.getElementById('sidebarDraftCount');
  if (el) { el.textContent = cnt; el.className = 'draft-badge' + (cnt===0?' zero':''); }
}

function loadDraftIntoForm(draft) {
  const d = draft.data;
  DENOMS.forEach(dn => {
    const i = document.getElementById('inside-'  + dn);
    const o = document.getElementById('outside-' + dn);
    const p = document.getElementById('prev-'    + dn);
    if (i) i.value = d.inside[dn]  || '';
    if (o) o.value = d.outside[dn] || '';
    if (p) p.value = d.prev[dn]    || '';
  });
  updateCalcTotals();
  closeSidebar();
  showToast('Loaded: ' + draft.name);
}

function clearAllInputs() {
  DENOMS.forEach(d => {
    ['inside-','outside-','prev-'].forEach(p => {
      const el = document.getElementById(p + d);
      if (el) el.value = '';
    });
  });
  updateCalcTotals();
}

// ── SIDEBAR ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  closeDraftsPanel();
  updateDraftBadge();
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.querySelectorAll('.draft-popover').forEach(p => p.remove());
  closeDraftsPanel();
}
function openDraftsPanel() {
  document.getElementById('sidebarMainMenu').style.display = 'none';
  document.getElementById('draftsPanel').classList.add('open');
  renderDraftsList();
}
function closeDraftsPanel() {
  document.getElementById('sidebarMainMenu').style.display = '';
  document.getElementById('draftsPanel').classList.remove('open');
}

function renderDraftsList() {
  const container = document.getElementById('draftsListContainer');
  const deleteAllContainer = document.getElementById('deleteAllContainer');
  const drafts = [...loadDrafts()].reverse();
  deleteAllContainer.innerHTML = '';
  if (drafts.length === 0) {
    container.innerHTML = '<div class="drafts-empty">No drafts saved yet.</div>';
    return;
  }
  container.innerHTML = '';
  drafts.forEach(draft => {
    const card = document.createElement('div');
    card.className = 'draft-card';
    card.id = 'draft-card-' + draft.id;
    const sd = new Date(draft.savedAt);
    const dateStr = sd.toLocaleDateString('en-CA', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = sd.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit', hour12:true });
    card.innerHTML =
      '<div class="draft-card-top">' +
        '<div class="draft-card-name">' + draft.name + '</div>' +
        '<button class="draft-dots" onclick="toggleDraftPopover(event,' + draft.id + ')">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
            '<circle cx="12" cy="5" r="1.2" fill="currentColor" stroke="none"/>' +
            '<circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/>' +
            '<circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>' +
          '</svg>' +
        '</button>' +
      '</div>' +
      '<div class="draft-card-meta">' + dateStr + ' &middot; ' + timeStr + '</div>';
    card.addEventListener('click', function(e) {
      if (e.target.closest('.draft-dots') || e.target.closest('.draft-popover')) return;
      loadDraftIntoForm(draft);
    });
    container.appendChild(card);
  });

  const btn = document.createElement('button');
  btn.className = 'delete-all-btn';
  btn.innerHTML =
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
    'Delete All Drafts';
  btn.onclick = confirmDeleteAllDrafts;
  deleteAllContainer.appendChild(btn);
}

function toggleDraftPopover(e, id) {
  e.stopPropagation();
  document.querySelectorAll('.draft-popover').forEach(p => p.remove());
  const card = document.getElementById('draft-card-' + id);
  if (!card) return;
  const pop = document.createElement('div');
  pop.className = 'draft-popover';
  pop.innerHTML =
    '<div class="draft-popover-item" onclick="loadFromPopover(' + id + ')">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' +
      'Load this draft' +
    '</div>' +
    '<div class="draft-popover-item delete" onclick="confirmDeleteDraft(' + id + ')">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
      'Delete this draft' +
    '</div>';
  card.appendChild(pop);
  setTimeout(() => {
    document.addEventListener('click', function h(ev) {
      if (!ev.target.closest('.draft-popover') && !ev.target.closest('.draft-dots')) {
        pop.remove();
        document.removeEventListener('click', h);
      }
    });
  }, 0);
}

function loadFromPopover(id) {
  const d = loadDrafts().find(x => x.id === id);
  if (d) loadDraftIntoForm(d);
}

function confirmDeleteDraft(id) {
  document.querySelectorAll('.draft-popover').forEach(p => p.remove());
  const drafts = loadDrafts();
  const draft  = drafts.find(d => d.id === id);
  if (!draft) return;
  const card = document.getElementById('draft-card-' + id);
  if (!card) return;
  const cf = document.createElement('div');
  cf.className = 'draft-confirm';
  cf.innerHTML =
    '<div class="draft-confirm-text">Delete <span class="draft-confirm-name">' + draft.name + '</span>?<br>This cannot be undone.</div>' +
    '<div class="draft-confirm-btns">' +
      '<button class="confirm-yes" onclick="executeDelete(' + id + ')">Yes, delete</button>' +
      '<button class="confirm-no" onclick="renderDraftsList()">Cancel</button>' +
    '</div>';
  card.replaceWith(cf);
}

function executeDelete(id) {
  let d = loadDrafts().filter(x => x.id !== id);
  saveDraftsStore(d);
  updateDraftBadge();
  renderDraftsList();
}

function confirmDeleteAllDrafts() {
  const deleteAllContainer = document.getElementById('deleteAllContainer');
  deleteAllContainer.innerHTML =
    '<div class="delete-all-confirm">' +
      '<div class="draft-confirm-text">Delete <strong>all drafts</strong>? This cannot be undone.</div>' +
      '<div class="draft-confirm-btns">' +
        '<button class="confirm-yes" onclick="executeDeleteAllDrafts()">Yes, delete all</button>' +
        '<button class="confirm-no" onclick="renderDraftsList()">Cancel</button>' +
      '</div>' +
    '</div>';
}

function executeDeleteAllDrafts() {
  saveDraftsStore([]);
  updateDraftBadge();
  renderDraftsList();
  showToast('All drafts deleted');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── PDF DATE HELPER ──
function getPDFDateParts() {
  const now = new Date();
  return {
    hh:   String(now.getHours()).padStart(2,'0'),
    mm:   String(now.getMinutes()).padStart(2,'0'),
    ss:   String(now.getSeconds()).padStart(2,'0'),
    dd:   String(now.getDate()).padStart(2,'0'),
    mo:   String(now.getMonth()+1).padStart(2,'0'),
    yyyy: String(now.getFullYear()),
  };
}

// ── PDF: SCRATCH REPORT ──
function downloadScratchReport() {
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const M = 52;
  let y = 64;

  doc.setFillColor(255,255,255);
  doc.rect(0, 0, pageW, doc.internal.pageSize.getHeight(), 'F');

  const { hh, mm, ss, dd, mo, yyyy } = getPDFDateParts();

  doc.setFont('helvetica','bold'); doc.setFontSize(26); doc.setTextColor(20,20,20);
  doc.text('Scratch Report', M, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(90,90,90);
  doc.text(hh+':'+mm+':'+ss, pageW-M, y-10, { align:'right' });
  doc.text(dd+'/'+mo+'/'+yyyy, pageW-M, y+5, { align:'right' });

  y += 20;
  doc.setDrawColor(200,200,200); doc.setLineWidth(0.5);
  doc.line(M, y, pageW-M, y);
  y += 28;

  const C = { ticketL:M, prevR:M+130, currR:M+230, soldR:M+310, amtR:M+400 };

  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(130,130,130);
  doc.text('Ticket',       C.ticketL, y);
  doc.text('Prev. Shift',  C.prevR,   y, { align:'right' });
  doc.text('This Shift',   C.currR,   y, { align:'right' });
  doc.text('Sold Qty',     C.soldR,   y, { align:'right' });
  doc.text('Amount ($)',   C.amtR,    y, { align:'right' });
  y += 5;
  doc.setDrawColor(215,215,215); doc.setLineWidth(0.5);
  doc.line(M, y, C.amtR+10, y);
  y += 22;

  let grandSoldAmt = 0;

  DENOMS.forEach((d,i) => {
    const prev    = getVal('prev-' + d);
    const curr    = getVal('inside-' + d) + getVal('outside-' + d);
    const soldQty = prev - curr;
    const soldAmt = soldQty > 0 ? soldQty * d : 0;
    grandSoldAmt += soldAmt;

    if (i%2===0) {
      doc.setFillColor(248,248,248);
      doc.rect(M-4, y-14, C.amtR-M+18, 22, 'F');
    }

    doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(20,20,20);
    doc.text('$'+d, C.ticketL, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(15);
    doc.setTextColor(55,95,155);  doc.text(String(prev), C.prevR, y, { align:'right' });
    doc.setTextColor(35,130,80);  doc.text(String(curr), C.currR, y, { align:'right' });

    if (soldQty > 0) {
      doc.setTextColor(30,30,30);   doc.text(String(soldQty), C.soldR, y, { align:'right' });
      doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(20,20,20);
      doc.text('$'+soldAmt, C.amtR, y, { align:'right' });
    } else if (soldQty < 0) {
      doc.setTextColor(180,180,180); doc.setFontSize(12);
      doc.text('restocked', C.soldR, y, { align:'right' });
      doc.text('—', C.amtR, y, { align:'right' });
    } else {
      doc.setTextColor(200,200,200); doc.setFontSize(15);
      doc.text('—', C.soldR, y, { align:'right' });
      doc.text('—', C.amtR, y, { align:'right' });
    }
    y += 26;
  });

  doc.setDrawColor(160,160,160); doc.setLineWidth(0.8);
  doc.line(M, y-2, C.amtR+10, y-2);
  y += 12;
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(30,30,30);
  doc.text('TOTAL SOLD', C.ticketL, y);
  doc.setFontSize(16); doc.setTextColor(20,20,20);
  doc.text('$'+grandSoldAmt, C.amtR, y, { align:'right' });

  doc.save('scratch-report-'+yyyy+mo+dd+'-'+hh+mm+ss+'.pdf');
  showToast('Scratch Report downloaded');
}
</script>
